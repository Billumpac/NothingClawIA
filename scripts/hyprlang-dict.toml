hex = "0xee1a1a1a"
description = "Default shadow color (used when shadowColor = \"shadow\")"

# ═══════════════════════════════════════════════════════════════════════════
#  DISPATCHERS — Lua API mappings for hyprland.lua generation
#  ═══════════════════════════════════════════════════════════════════════════
#  Each entry maps a Hyprland dispatcher name to its hl.dsp.* Lua expression.
#  {arg} is replaced with the resolved argument at generation time.
#  arg = true means the dispatcher takes an argument.
#  ═══════════════════════════════════════════════════════════════════════════

[dispatchers.exec]
lua = 'hl.dsp.exec_cmd("{arg}")'
arg = true

[dispatchers.execr]
lua = 'hl.dsp.exec_raw("{arg}")'
arg = true

[dispatchers.killactive]
lua = 'hl.dsp.window.close()'

[dispatchers.closewindow]
lua = 'hl.dsp.window.close()'

[dispatchers.killwindow]
lua = 'hl.dsp.window.kill()'

[dispatchers.togglefloating]
lua = 'hl.dsp.window.float()'

[dispatchers.setfloating]
lua = 'hl.dsp.window.float()'

[dispatchers.settiled]
lua = 'hl.dsp.window.float()'

[dispatchers.fullscreen]
lua = 'hl.dsp.window.fullscreen()'

[dispatchers.fullscreenstate]
lua = 'hl.dsp.window.fullscreen_state({ internal = {arg}, client = {arg} })'
arg = true

[dispatchers.pseudo]
lua = 'hl.dsp.window.pseudo()'

[dispatchers.togglegroup]
lua = 'hl.dsp.group.toggle()'

[dispatchers.changegroupactive]
lua = 'hl.dsp.group.next()'

[dispatchers.movegroupwindow]
lua = 'hl.dsp.group.move_window()'

[dispatchers.lockgroups]
lua = 'hl.dsp.group.lock()'

[dispatchers.lockactivegroup]
lua = 'hl.dsp.group.lock_active()'

[dispatchers.movefocus]
lua = 'hl.dsp.focus({ direction = "{arg}" })'
arg = true

[dispatchers.movewindow]
lua = 'hl.dsp.window.move({ direction = "{arg}" })'
arg = true

[dispatchers.workspace]
lua = 'hl.dsp.focus({ workspace = "{arg}" })'
arg = true

[dispatchers.movetoworkspace]
lua = 'hl.dsp.window.move({ workspace = "{arg}" })'
arg = true

[dispatchers.movetoworkspacesilent]
lua = 'hl.dsp.window.move({ workspace = "{arg}", follow = false })'
arg = true

[dispatchers.togglespecialworkspace]
lua = 'hl.dsp.workspace.toggle_special("{arg}")'
arg = true

[dispatchers.focusmonitor]
lua = 'hl.dsp.focus({ monitor = "{arg}" })'
arg = true

[dispatchers.centerwindow]
lua = 'hl.dsp.window.center()'

[dispatchers.bringactivetotop]
lua = 'hl.dsp.window.bring_to_top()'

[dispatchers.pin]
lua = 'hl.dsp.window.pin()'

[dispatchers.toggleswallow]
lua = 'hl.dsp.window.toggle_swallow()'

[dispatchers.layoutmsg]
lua = 'hl.dsp.layout("{arg}")'
arg = true

[dispatchers.dpms]
lua = 'hl.dsp.dpms()'

[dispatchers.event]
lua = 'hl.dsp.event("{arg}")'
arg = true

[dispatchers.global]
lua = 'hl.dsp.global("{arg}")'
arg = true

[dispatchers.exit]
lua = 'hl.dsp.exit()'

[dispatchers.submap]
lua = 'hl.dsp.submap("{arg}")'
arg = true

[dispatchers.renameworkspace]
lua = 'hl.dsp.workspace.rename({{ workspace = "{arg}" }})'
arg = true

[dispatchers.moveworkspacetomonitor]
lua = 'hl.dsp.workspace.move({{ workspace = "{arg}" }})'
arg = true

[dispatchers.movecurrentworkspacetomonitor]
lua = 'hl.dsp.workspace.move({{ monitor = "{arg}" }})'
arg = true

[dispatchers.swapactiveworkspaces]
lua = 'hl.dsp.workspace.swap_monitors({{ monitor1 = "{arg}", monitor2 = "{arg}" }})'
arg = true

[dispatchers.force_renderer_reload]
lua = 'hl.dsp.force_renderer_reload()'

[dispatchers.resizeactive]
lua = 'hl.dsp.exec_cmd("hyprctl dispatch resizeactive {arg}")'
arg = true

[dispatchers.resizewindow]
lua = 'hl.dsp.window.resize()'
arg = false
note = "Legacy alias for movewindow_resize (binds.json legacy.dispatcher, mouse-driven)"

[dispatchers.movewindow_mouse]
lua = 'hl.dsp.window.drag()'

[dispatchers.movewindow_resize]
lua = 'hl.dsp.window.resize()'


