# ═══════════════════════════════════════════════════════════════════════════
#  CONFIG ORDER — Controls the output order of sections in conf/lua files
# ═══════════════════════════════════════════════════════════════════════════
#  These lists define the order sections appear in the generated config files.
#  Sections not listed will still be rendered but at the end.
# ═══════════════════════════════════════════════════════════════════════════

[config_order]
# Section order for hyprland.conf (all sections)
conf = ["general", "decoration", "input", "cursor", "gestures", "misc",
        "xwayland", "free", "dwindle", "master", "scrolling", "animations", "group",
        "binds", "opengl", "render", "ecosystem", "quirks", "debug"]
# Section order for hyprland.lua (layout-only sections excluded — not in hl.config API)
lua = ["general", "decoration", "input", "cursor", "gestures", "misc",
       "xwayland", "animations", "group", "binds", "opengl", "render",
       "ecosystem", "quirks", "debug"]
lua_exclude = ["dwindle", "master", "scrolling", "binds", "free"]


