# ═══════════════════════════════════════════════════════════════════════════
#  CONFIG DERIVED — Computed settings derived from other compositor.json keys
# ═══════════════════════════════════════════════════════════════════════════
#  Each entry maps a compositor.json key to derived settings applied before
#  generating conf/lua/toml output. No Python logic — pure data.
# ═══════════════════════════════════════════════════════════════════════════

[config_derived.smart_resize_anchors]
description = "smartResizeAnchors: when true, resizeOnBorder=true + min grab area"
key = "smartResizeAnchors"  # compositor.json key that triggers this rule
when_true = { resizeOnBorder = true, extendBorderGrabArea = "max(10, current)" }
when_false = { resizeOnBorder = false, extendBorderGrabArea = 0 }


# ═══════════════════════════════════════════════════════════════════════════
#  FREE LAYOUT RULES — Window rules applied when free layout is active
# ═══════════════════════════════════════════════════════════════════════════
#  conf: windowrule block inserted into hyprland.conf when layout == "free"
#  lua:  hl.window_rule() call inserted into hyprland.lua when layout == "free"
#  The Python script reads these verbatim and injects them conditionally.
# ═══════════════════════════════════════════════════════════════════════════

[free_layout_rules]
conf = '''
windowrule {
    match = .*
    float = true
}'''
lua = 'hl.window_rule({ match = { class = ".*" }, float = true })'


# ═══════════════════════════════════════════════════════════════════════════
#  GESTURE BINDINGS — Trackpad gesture action bindings (End4Dots style)
# ═══════════════════════════════════════════════════════════════════════════
#  Each entry maps a compositor.json boolean toggle to hl.gesture() blocks.
#  These are NOT key-value config — they're gesture action bindings.
#
#  nothingless_key: compositor.json key (bool) — enables/disables the gesture
#  fingers:         number of fingers for this gesture
#  direction:       swipe | pinch | left | right | up | down
#  conf_action:     (optional) built-in action for .conf single-line: gesture = N, dir, action
#  conf_dispatcher: (optional) dispatcher for .conf: gesture = N, dir, dispatcher, name[, arg]
#  conf_argument:   (optional) argument for conf_dispatcher
#  lua_action:      (optional) built-in action string for hl.gesture() in .lua
#  lua_dispatcher:  (optional) custom dispatcher for .lua inline function body
#  lua_argument:    (optional) argument for custom .lua dispatcher
#  toml_action:     (optional) built-in action string for [[gestures]] in TOML
#  toml_dispatcher: (optional) custom dispatcher for TOML [[gestures]]
#  toml_argument:   (optional) argument for custom TOML dispatcher
# ═══════════════════════════════════════════════════════════════════════════

[gesture_bindings.3finger_swipe]
description = "3-finger swipe to move/resize window"
nothingless_key = "gesture3FingerSwipe"
fingers = 3
direction = "swipe"
conf_action = "move"
lua_action = "move"
toml_action = "move"

