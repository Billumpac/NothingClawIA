# =============================================================================
#  Hyprland Complete Configuration Dictionary
#  =============================================================================
#  Source: https://wiki.hypr.land/Configuring/Basics/Variables/ (v0.55+)
#
#  Each entry:
#    description  — What this setting does
#    type         — int|bool|float|str|color|vec2|gradient|css_gaps|font_weight
#    default      — Default value (Lua literal)
#    lua          — Dot.path for hl.config({})  [ALL entries have this]
#    conf         — Colon:keyword for hyprland.conf  [MISSING if Lua-only]
#    note         — (optional) Extra info
#
#  ⚠ Hyprland 0.55+ deprecated hyprlang (.conf) in favor of Lua.
#    Entries WITHOUT a 'conf' field are Lua-only.
# =============================================================================

[general.border_size]
description = "Size of the border around windows"
type = "int"
default = "1"
lua = "general.border_size"
conf = "general:border_size"

[general.gaps_in]
description = "Gaps between windows"
type = "css_gaps"
default = "5"
lua = "general.gaps_in"
conf = "general:gaps_in"

[general.gaps_out]
description = "Gaps between windows and monitor edges"
type = "css_gaps"
default = "20"
lua = "general.gaps_out"
conf = "general:gaps_out"

[general.float_gaps]
description = "Gaps between windows and monitor edges for floating windows. -1 means default."
type = "css_gaps"
default = "0"
lua = "general.float_gaps"
conf = "general:float_gaps"

[general.gaps_workspaces]
description = "Gaps between workspaces. Stacks with gaps_out."
type = "css_gaps"
default = "0"
lua = "general.gaps_workspaces"
conf = "general:gaps_workspaces"

[general.col_inactive_border]
